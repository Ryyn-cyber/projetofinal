<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Reservas - Coliseu UFC</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="voltar">
    <a href="index.html">⬅ Página Inicial</a>
</div>

<div class="formulario">

<h1>🎟️ RESERVAR MESA</h1>

<form>

<input type="text" placeholder="Nome Completo" required>

<input type="email" placeholder="E-mail" required>

<select required>
    <option value="">Quantidade de Pessoas</option>
    <option value="5-10">5 a 10 pessoas</option>
    <option value="10-15">10 a 15 pessoas</option>
    <option value="15-20">15 a 20 pessoas</option>
</select>

<select>


<option>Área Normal</option>

<option>Área VIP</option>

</select>

<select id="categoriaPeso">

<option>Pesos</option>

<option value="leve">Peso Leve</option>

<option value="medio">Peso Médio</option>

<option value="pesado">Peso Pesado</option>



</select>

<button type="submit">
🥊 CONFIRMAR RESERVA
</button>

</form>

</div>



</body>
</html>
